services:
  # Backend Service
  - type: web
    name: petstore-backend
    env: docker
    rootDir: backend
    dockerContext: .
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: petstore-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: petstore-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: petstore-db
          property: password
      - key: PORT
        value: 8080

  # Frontend Service
  - type: web
    name: petstore-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://petstore-backend.onrender.com/api/pets

    # Note: For Vite, we need the full URL. Render's property 'host' gives the internal/external host.
    # Usually, we want the external URL for the frontend to talk to.
    # We might need to manually set this if 'host' isn't the full URL.
    # Actually, Render static sites need the URL at BUILD time for Vite.
    # So we might need to update this after the backend is first deployed, 
    # or use a relative path if they were on the same domain (not here).

databases:
  - name: petstore-db
    databaseName: petstore
    user: petstore_user
    plan: free
    region: oregon
